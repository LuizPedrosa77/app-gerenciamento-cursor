name: 🚀 Deploy to Production

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: hubnexusai
  IMAGE_NAME_FRONTEND: gpfx-frontend
  IMAGE_NAME_BACKEND: gpfx-backend

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test -- --coverage --watchAll=false

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/lcov.info,./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella

  build-and-push:
    name: 🏗️ Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      frontend-digest: ${{ steps.build-frontend.outputs.digest }}
      backend-digest: ${{ steps.build-backend.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=true
            suffix=onpr

      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=true
            suffix=onpr

      - name: Build and push backend image
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          timeout: 300s
          command_timeout: 300s
          script_stop: "docker-compose -f docker-compose.saas.yml down"
          script: |
            # Set environment variables
            export SECRET_KEY="${{ secrets.SECRET_KEY }}"
            export INTERNAL_API_KEY="${{ secrets.INTERNAL_API_KEY }}"
            export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            export MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY }}"
            export MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY }}"
            export N8N_WEBHOOK_URL="${{ secrets.N8N_WEBHOOK_URL }}"
            
            echo "🚀 Starting deployment..."
            
            # Pull latest images
            docker-compose -f docker-compose.saas.yml pull
            
            # Stop existing services
            docker-compose -f docker-compose.saas.yml down
            
            # Remove old containers and images
            docker system prune -f
            
            # Start services
            docker-compose -f docker-compose.saas.yml up -d
            
            # Wait for services to be healthy
            echo "⏳ Waiting for services to be healthy..."
            sleep 30
            
            # Check service health
            for service in frontend backend postgres redis minio; do
              echo "🔍 Checking $service health..."
              if docker-compose -f docker-compose.saas.yml ps $service | grep -q "Up (healthy)"; then
                echo "✅ $service is healthy"
              else
                echo "❌ $service is not healthy"
                docker-compose -f docker-compose.saas.yml logs $service
                exit 1
              fi
            done
            
            # Run migrations
            echo "📊 Running database migrations..."
            docker-compose -f docker-compose.saas.yml exec backend sh -c "cd /app && ./scripts/run_migrations.sh up"
            
            echo "🎉 Deployment completed successfully!"
            
            # Show running services
            docker-compose -f docker-compose.saas.yml ps

  health-check:
    name: 🔍 Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Check application health
        run: |
          sleep 60  # Wait for services to fully start
          
          # Check frontend
          echo "🔍 Checking frontend health..."
          if curl -f -s https://fx.hubnexusai.com/health > /dev/null; then
            echo "✅ Frontend is healthy"
          else
            echo "❌ Frontend is not healthy"
            exit 1
          fi
          
          # Check backend
          echo "🔍 Checking backend health..."
          if curl -f -s https://api.hubnexusai.com/health > /dev/null; then
            echo "✅ Backend is healthy"
          else
            echo "❌ Backend is not healthy"
            exit 1
          fi
          
          # Check database
          echo "🔍 Checking database connection..."
          if curl -f -s https://api.hubnexusai.com/health/db > /dev/null; then
            echo "✅ Database is healthy"
          else
            echo "❌ Database is not healthy"
            exit 1
          fi

  rollback:
    name: 🔄 Rollback
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: deploy
    environment: production
    steps:
      - name: Rollback deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          timeout: 300s
          script_stop: "echo 'Rollback completed'"
          script: |
            echo "🔄 Starting rollback..."
            
            # Get previous images
            PREVIOUS_FRONTEND=$(docker images --format "table {{.Repository}}:{{.Tag}}" ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }} | sed -n '2p' | awk '{print $2}')
            PREVIOUS_BACKEND=$(docker images --format "table {{.Repository}}:{{.Tag}}" ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }} | sed -n '2p' | awk '{print $2}')
            
            # Stop current services
            docker-compose -f docker-compose.saas.yml down
            
            # Deploy previous versions
            docker-compose -f docker-compose.saas.yml pull
            docker-compose -f docker-compose.saas.yml up -d
            
            echo "🎉 Rollback completed!"

  notify:
    name: 📢 Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: always()
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success' && needs.health-check.result == 'success'
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=🎉 GPFX deployed successfully!%0A%0A✅ Frontend: https://fx.hubnexusai.com%0A✅ Backend: https://api.hubnexusai.com%0A%0ACommit: ${{ github.sha }}"

      - name: Notify failure
        if: needs.deploy.result == 'failure' || needs.health-check.result == 'failure'
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=❌ GPFX deployment failed!%0A%0A🔗 Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
